<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pandan AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#0f172a;
color:#e2e8f0;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

#sidebar{
width:260px;
background:#020617;
border-right:1px solid #1e293b;
display:flex;
flex-direction:column;
}

#newChat{
margin:15px;
padding:12px;
background:#38bdf8;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

#chatList{
flex:1;
overflow-y:auto;
padding:10px;
}

.chatItem{
padding:10px;
margin-bottom:6px;
background:#0f172a;
border-radius:6px;
cursor:pointer;
font-size:0.9rem;
}

.chatItem:hover{
background:#1e293b;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

header{
text-align:center;
padding:15px;
background:#1e293b;
border-bottom:1px solid #334155;
}

h1{
color:#38bdf8;
margin:0;
}

/* CHAT AREA */

#chatArea{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.message{
margin:8px 0;
padding:12px 16px;
border-radius:12px;
max-width:70%;
white-space:pre-wrap;
}

.user{
background:#38bdf8;
color:#0f172a;
align-self:flex-end;
}

.ai{
background:#1e293b;
border:1px solid #334155;
}

/* INPUT */

#inputArea{
display:flex;
padding:15px;
background:#1e293b;
border-top:1px solid #334155;
}

#userInput{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
margin-right:10px;
}

#sendButton{
padding:12px 20px;
border-radius:8px;
border:none;
background:#38bdf8;
cursor:pointer;
font-weight:600;
}

/* LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:60px;
height:60px;
border:6px solid #334155;
border-top:6px solid #38bdf8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
<p>Pandan AI...</p>
</div>

<!-- SIDEBAR -->

<div id="sidebar">

<button id="newChat">+ New Chat</button>

<div id="chatList"></div>

</div>

<!-- MAIN -->

<div id="main">

<header>
<h1>Pandan AI</h1>
</header>

<div id="chatArea"></div>

<div id="inputArea">
<input type="text" id="userInput" placeholder="Ketik pesan...">
<button id="sendButton">Kirim</button>
</div>

</div>

<script>

const api={
url:"https://api.termai.cc",
key:"Bell409"
};

let chats=JSON.parse(localStorage.getItem("pandan_chats"))||{};
let currentChatId=null;

/* LOADER */

window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},1200)

renderChatList()
}

/* NEW CHAT */

document.getElementById("newChat").onclick=()=>{
currentChatId="chat_"+Date.now()

chats[currentChatId]=[]

saveChats()

loadChat(currentChatId)

renderChatList()
}

/* SAVE */

function saveChats(){
localStorage.setItem("pandan_chats",JSON.stringify(chats))
}

/* LOAD CHAT */

function loadChat(id){

currentChatId=id

document.getElementById("chatArea").innerHTML=""

chats[id].forEach(m=>{
displayMessage(m.text,m.type)
})

}

/* SIDEBAR */

function renderChatList(){

const list=document.getElementById("chatList")
list.innerHTML=""

for(const id in chats){

const div=document.createElement("div")
div.className="chatItem"

let preview=chats[id][0]?.text||"Chat Baru"

div.textContent=preview.slice(0,30)

div.onclick=()=>loadChat(id)

list.appendChild(div)

}

}

/* SEND MESSAGE */

document.getElementById("sendButton").onclick=sendMessage

document.getElementById("userInput").addEventListener("keypress",e=>{
if(e.key==="Enter")sendMessage()
})

async function sendMessage(){

const input=document.getElementById("userInput")
const text=input.value.trim()

if(!text)return

if(!currentChatId){
document.getElementById("newChat").click()
}

displayMessage(text,"user")

saveMessage(text,"user")

input.value=""

const typing=displayMessage("AI sedang mengetik...","ai")

try{

const res=await fetch(`${api.url}/api/chat/bard?query=${encodeURIComponent(text)}&key=${api.key}`)

const json=await res.json()

typing.remove()

const reply=json.chatUi||"AI tidak memberi jawaban."

displayMessage(reply,"ai")

saveMessage(reply,"ai")

}catch{

typing.remove()

displayMessage("Gagal terhubung ke AI","ai")

}

}

/* DISPLAY */

function displayMessage(text,type){

const chatArea=document.getElementById("chatArea")

const div=document.createElement("div")

div.className="message "+type

div.textContent=text

chatArea.appendChild(div)

chatArea.scrollTop=chatArea.scrollHeight

return div

}

/* SAVE MESSAGE */

function saveMessage(text,type){

chats[currentChatId].push({text,type})

saveChats()

}

</script>

</body>
</html>
